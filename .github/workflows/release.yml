name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read release version
        id: release
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$tag' is not a valid semver version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Check npm version availability
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          version="${{ steps.release.outputs.version }}"

          if npm view "${package_name}@${version}" version > /dev/null 2>&1; then
            echo "::warning::${package_name}@${version} is already published on npm. Skipping publish and continuing with the repository version bump."
            echo "published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "published=false" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Publish to npm
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Checkout default branch for commit
        run: |
          git fetch origin ${{ github.event.repository.default_branch }}
          git checkout -B ${{ github.event.repository.default_branch }} origin/${{ github.event.repository.default_branch }}
          npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Create version bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          branch="chore/release-bump-${VERSION}"
          git checkout -B "$branch"
          git commit -m "chore(release): bump version to ${VERSION}"
          git push --force-with-lease origin "$branch"

          existing_pr="$(gh pr list --head "$branch" --base "$DEFAULT_BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Version bump pull request already exists: #${existing_pr}"
            exit 0
          fi

          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$branch" \
            --title "chore(release): bump version to ${VERSION}" \
            --body "Updates package metadata to match the published npm release ${VERSION}."

name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read release version
        id: release
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$tag' is not a valid semver version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Check npm version availability
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          version="${{ steps.release.outputs.version }}"

          if npm view "${package_name}@${version}" version > /dev/null 2>&1; then
            echo "::error::${package_name}@${version} is already published on npm. Create a release with a new version."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "chore(release): bump version to ${{ steps.release.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
